              - paragraph [ref=e150]:
                - text: Drone provides the ability to store named parameters internal or external to the
                - emphasis [ref=e151]: .drone.yml
                - text: configuration file as an encrypted secret store. Individual steps in the yaml can request access to these named parameters at runtime.
              - paragraph [ref=e152]: "The main secret types supported are:"
              - list [ref=e153]:
                - listitem [ref=e154]: Repository secrets
                - listitem [ref=e155]: Encrypted secrets
              - heading "Creating and using Drone repository secretsDirect link to Creating and using Drone repository secrets" [level=2] [ref=e156]:
                - text: Creating and using Drone repository secrets
                - link "Direct link to Creating and using Drone repository secrets" [ref=e157] [cursor=pointer]:
                  - /url: "#creating-and-using-drone-repository-secrets"
                  - text: "#"
              - paragraph [ref=e158]: Drone repository secrets (also referenced as "drone secrets") are different from Kubernetes secrets, these values are encrypted and stored in the Drone database and can only be referrenced in Drone pipeline definitions.
              - paragraph [ref=e159]: "On the Drone web interface, open the secrets management interface from your project settings:"
              - img [ref=e160]
              - paragraph [ref=e161]: "Once the secrets are created, you can source them directly as environment variables in your build steps:"
              - generic [ref=e163]:
                - code [ref=e165]:
                  - generic [ref=e166]: "kind: pipeline"
                  - generic [ref=e167]: "name: default"
                  - generic [ref=e168]: "steps:"
                  - generic [ref=e169]: "- name: build"
                  - generic [ref=e170]: "image: alpine"
                  - generic [ref=e171]: "environment:"
                  - generic [ref=e172]: "access_key:"
