              - paragraph [ref=e216]: Encrypted secrets are used to store sensitive information, such as passwords, tokens, and ssh keys directly in your configuration file as an encrypted string. This type of secret requires the use of Drone command line tools.
              - paragraph [ref=e217]: "Generate the encrypted secret with:"
              - generic [ref=e219]:
