            - generic [ref=e141]:
              - heading "Onboarding" [level=1] [ref=e143]
              - paragraph [ref=e144]: Welcome to Kanopy, MongoDB's self-service internal development platform based on Kubernetes. This guide is aimed at helping our internal developers understand the technical requirements and best practices for deploying software using Kanopy. By following this documentation, you will ensure a smooth deployment experience on Kanopy.
              - paragraph [ref=e145]:
                - text: Refer to the
                - link "Kanopy Access Documentation" [ref=e146] [cursor=pointer]:
                  - /url: /docs/access/
                - text: for instructions on getting access to Kanopy or to see if you already have access.
              - heading "Knowledge ExpectationsDirect link to Knowledge Expectations" [level=2] [ref=e147]:
                - text: Knowledge Expectations
                - link "Direct link to Knowledge Expectations" [ref=e148] [cursor=pointer]:
                  - /url: "#knowledge-expectations"
                  - text: "#"
              - paragraph [ref=e149]: "Before you begin deploying on Kanopy, it is assumed that you have the following prerequisite knowledge:"
              - list [ref=e150]:
                - listitem [ref=e151]:
                  - strong [ref=e152]: Familiarity with the Command Line
                  - text: ": Basic proficiency with command line interfaces is necessary for building container images, working with version control, and locally validating your applications."
                - listitem [ref=e153]:
                  - strong [ref=e154]: Kubernetes Knowledge
                  - text: ": Basic understanding of Kubernetes concepts (Pods, Services, Deployments, etc.) is helpful in understanding how to interact with your applications after they are deployed."
                - listitem [ref=e155]:
                  - strong [ref=e156]: Familiarity with CI/CD
                  - text: ": Basic understanding of how to configure and use CI/CD pipelines for software delivery. We currently use Drone for CI/CD, which is explained in more detail in our"
                  - link "getting started" [ref=e157] [cursor=pointer]:
                    - /url: /docs/getting_started/
                  - text: docs.
              - heading "Technical RequirementsDirect link to Technical Requirements" [level=2] [ref=e158]:
                - text: Technical Requirements
                - link "Direct link to Technical Requirements" [ref=e159] [cursor=pointer]:
                  - /url: "#technical-requirements"
                  - text: "#"
              - paragraph [ref=e160]: "When preparing your software for deployment on Kanopy, you must adhere to the following technical guidelines:"
              - list [ref=e161]:
                - listitem [ref=e162]:
                  - strong [ref=e163]: Containerization
                  - text: ": Ensure your application can be containerized as an OCI image. This is most commonly done using a"
                  - link "Dockerfile" [ref=e164] [cursor=pointer]:
                    - /url: https://docs.docker.com/build/concepts/dockerfile/
                  - text: .
                - listitem [ref=e165]:
                  - strong [ref=e166]: Kubernetes Support
                  - text: ": When considering running \"off the shelf\" or open source software in Kanopy, you should prefer options that have documented support for deployment to Kubernetes clusters. Note that extra work is required to run software on Kanopy if this support does not exist. Such as packaging the software into containers, developing production tooling for deployment using Kubernetes APIs, testing, etc."
                - listitem [ref=e167]:
                  - strong [ref=e168]: Architecture
                  - text: ": Kanopy currently has broad support for both amd64 and arm64 workloads."
                - listitem [ref=e169]:
                  - strong [ref=e170]: Resource Requests and Limits
                  - text: ": Kanopy is an autoscaling distributed system and can support workloads of varying sizes, as it relates to CPU, memory, storage, network, etc."
                  - link "Reach out to the Kanopy team" [ref=e171] [cursor=pointer]:
                    - /url: /docs/#support
                  - text: early if you think your workload has any special hardware requirements to consider.
                - listitem [ref=e172]:
                  - strong [ref=e173]: Ingress
                  - text: ": Kanopy is primarily built to serve L7 HTTP traffic (web services, APIs, etc.) for services that require external network ingress."
                - listitem [ref=e174]:
                  - strong [ref=e175]: Observability and Logging
                  - text: ": Workloads running in Kanopy expose structured application logs as"
                  - code [ref=e176]: stdout
                  - text: which automatically get forwarded to our log aggregation service (Splunk).
                - listitem [ref=e177]:
                  - strong [ref=e178]: Security
                  - text: ": Kanopy only exposes services behind our corporate authentication service (CorpSecure) by default. Please see the docs for"
                  - link "CorpSecure" [ref=e179] [cursor=pointer]:
                    - /url: /docs/corpsecure/
                  - text: to understand how you should build your applications to support this auth model.
                - listitem [ref=e180]:
                  - strong [ref=e181]: CI/CD Pipeline
                  - text: ": We recommend that all software is delivered using our CI/CD tooling (Drone). The process for setting this up for your application is described in more detail in our"
                  - link "getting started docs" [ref=e182] [cursor=pointer]:
                    - /url: /docs/getting_started/
                  - text: .
              - heading "Workloads That Are Suitable for KanopyDirect link to Workloads That Are Suitable for Kanopy" [level=2] [ref=e183]:
                - text: Workloads That Are Suitable for Kanopy
                - link "Direct link to Workloads That Are Suitable for Kanopy" [ref=e184] [cursor=pointer]:
                  - /url: "#workloads-that-are-suitable-for-kanopy"
                  - text: "#"
              - paragraph [ref=e185]: "Kanopy is designed to streamline and enhance a wide variety of software development and integration tasks. It excels in the following types of workloads:"
              - list [ref=e186]:
                - listitem [ref=e187]:
                  - paragraph [ref=e188]:
                    - strong [ref=e189]: "Internally Developed Software:"
                    - text: Kanopy is particularly well suited for managing and deploying internally developed software that is either internally-facing or public-facing. This includes applications and tools developed in-house to support specific business needs, as well as frameworks designed for internal integration and automation. Kanopy provides a cohesive environment for building, testing, and scaling these applications, ensuring they align with production standards and operational workflows.
                - listitem [ref=e190]:
                  - paragraph [ref=e191]:
                    - strong [ref=e192]: "Third-Party Software Integration:"
                    - text: Kanopy offers the same robust capabilities for deploying third-party software that is suitable for a containerized environment.
                - listitem [ref=e193]:
                  - paragraph [ref=e194]:
                    - strong [ref=e195]: "Off-the-Shelf Licensed Software:"
                    - text: Kanopy also supports the deployment and management of off-the-shelf licensed software. This includes commercial software solutions that require customization or configuration to fit within the enterprise environment. Kanopy aids in orchestrating these configurations and monitoring their performance over time, ensuring that they meet organizational requirements and deliver optimal value.
              - paragraph [ref=e196]: Overall, Kanopy is engineered to provide flexible, scalable, and secure solutions across a varied set of workloads, enabling efficient and effective software development and integration within the organization.
              - heading "Workloads That Might Not Be Suitable for KanopyDirect link to Workloads That Might Not Be Suitable for Kanopy" [level=2] [ref=e197]:
                - text: Workloads That Might Not Be Suitable for Kanopy
                - link "Direct link to Workloads That Might Not Be Suitable for Kanopy" [ref=e198] [cursor=pointer]:
                  - /url: "#workloads-that-might-not-be-suitable-for-kanopy"
                  - text: "#"
              - paragraph [ref=e199]: "While Kanopy is a robust platform that works for many deployment scenarios, some workloads are not suitable for the container deployment model. These might include:"
              - list [ref=e200]:
                - listitem [ref=e201]:
                  - strong [ref=e202]: Customer Reproduction Using Specific Cloud Provider Services
                  - text: ": Scenarios where reproducing customer environments requires the use of specific services native to a cloud provider that are not available in Kubernetes."
                - listitem [ref=e203]:
                  - strong [ref=e204]: Stateful Services with Complex Storage Needs
                  - text: ": Although there are many stateful workloads currently running in Kanopy. It might make more sense to run some stateful workloads in hosted infrastructure that is better suited for reliably running those workloads, such as"
                  - link "https://www.mongodb.com/atlas" [ref=e205] [cursor=pointer]:
                    - /url: https://www.mongodb.com/atlas
                  - text: .
                - listitem [ref=e206]:
                  - strong [ref=e207]: Specialized Hardware
                  - text: ": Workloads that rely heavily on specialized hardware that is not available in Kanopy's infrastructure."
              - heading "Further ReadingDirect link to Further Reading" [level=2] [ref=e208]:
                - text: Further Reading
                - link "Direct link to Further Reading" [ref=e209] [cursor=pointer]:
                  - /url: "#further-reading"
                  - text: "#"
              - list [ref=e210]:
                - listitem [ref=e211]:
                  - link "Migration guide for existing workloads" [ref=e212] [cursor=pointer]:
