                    - /url: /docs/getting_started/
              - heading "Migrating Existing Workloads to KanopyDirect link to Migrating Existing Workloads to Kanopy" [level=2] [ref=e219]:
                - text: Migrating Existing Workloads to Kanopy
                - link "Direct link to Migrating Existing Workloads to Kanopy" [ref=e220] [cursor=pointer]:
                  - /url: "#migrating-existing-workloads-to-kanopy"
