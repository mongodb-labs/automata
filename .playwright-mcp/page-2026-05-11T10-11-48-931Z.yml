              - paragraph [ref=e172]:
                - text: Drone pipelines have a default timeout of 60 minutes. If you have a use case that requires a pipeline that runs for longer than 60 minutes, please open
                - link "KANOPY issue" [ref=e173] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/plugins/servlet/desk/portal/48
                - text: with the name of the repository, the long running stages, and the upper bound for how long a build is expected to take.
              - heading "Drone CLIDirect link to Drone CLI" [level=2] [ref=e174]:
                - text: Drone CLI
                - link "Direct link to Drone CLI" [ref=e175] [cursor=pointer]:
                  - /url: "#drone-cli"
                  - text: "#"
              - paragraph [ref=e176]: Drone offers a CLI to perform operations from the command line.
              - paragraph [ref=e177]:
                - link "Installation" [ref=e178] [cursor=pointer]:
                  - /url: https://docs.drone.io/cli/install/
              - paragraph [ref=e179]:
                - link "Configuration" [ref=e180] [cursor=pointer]:
                  - /url: https://docs.drone.io/cli/configure/
              - paragraph [ref=e181]: From the CLI you can for example, add a secret
              - generic [ref=e183]:
                - code [ref=e185]:
                  - generic [ref=e186]: drone secret add <repo> --name=test --data=hello
                - button "Copy code to clipboard" [ref=e188] [cursor=pointer]:
                  - generic [ref=e189]:
                    - img [ref=e190]
                    - img [ref=e192]
              - paragraph [ref=e194]:
                - text: The full reference for Drone commands can be found
                - link "here" [ref=e195] [cursor=pointer]:
                  - /url: https://docs.drone.io/cli/install/
                - text: on the left hand nav bar.
              - heading "Trigger Downstream BuildsDirect link to Trigger Downstream Builds" [level=2] [ref=e196]:
                - text: Trigger Downstream Builds
                - link "Direct link to Trigger Downstream Builds" [ref=e197] [cursor=pointer]:
                  - /url: "#trigger-downstream-builds"
                  - text: "#"
              - paragraph [ref=e198]:
                - text: Lets say you have
                - code [ref=e199]: repoA
                - text: which has
                - code [ref=e200]: repoB
                - text: as a submodule, and you would like to rebuild
                - code [ref=e201]: repoA
                - text: everytime someone pushes to
                - code [ref=e202]: repoB
                - text: and begins a build. In this case you may think of
                - code [ref=e203]: repoB
                - text: as an upstream repository and
                - code [ref=e204]: repoA
                - text: as its downstream repository. Drone enables you to easily list downstream repositories in the
                - code [ref=e205]: drone.yml
                - text: file of the upstream repository.
              - paragraph [ref=e206]:
                - text: First add a secret in drone with the name
                - code [ref=e207]: downstream_token
                - text: and paste in your OAuth token found in Drone. (You must have admin access to both repositories).
              - paragraph [ref=e208]:
                - text: Next, add the following stage to an upstream repository and replace
                - code [ref=e209]: DOWNSTREAM_REPO
                - text: "with the name of the desired repository(s):"
              - generic [ref=e211]:
                - code [ref=e213]:
                  - generic [ref=e214]: "steps:"
                  - generic [ref=e215]: "- name: trigger"
                  - generic [ref=e216]: "image: plugins/downstream"
                  - generic [ref=e217]: "settings:"
                  - generic [ref=e218]: "server: https://drone.corp.mongodb.com"
                  - generic [ref=e219]: "token:"
                  - generic [ref=e220]: "from_secret: downstream_token"
                  - generic [ref=e221]: "fork: true"
                  - generic [ref=e222]: "repositories:"
                  - generic [ref=e223]: "- DOWNSTREAM_REPO"
                - button "Copy code to clipboard" [ref=e225] [cursor=pointer]:
                  - generic [ref=e226]:
                    - img [ref=e227]
                    - img [ref=e229]
              - list [ref=e231]:
                - listitem [ref=e232]:
                  - text: Here are the
                  - link "settings" [ref=e233] [cursor=pointer]:
                    - /url: https://plugins.drone.io/plugins/downstream
                  - text: for
                  - code [ref=e234]: plugins/downstream
                  - text: .
                - listitem [ref=e235]:
                  - text: Note,
                  - code [ref=e236]: DOWNSTREAM_REPO
                  - text: is in the format
                  - code [ref=e237]: 10gen/repo
                  - text: ", a specific branch"
                  - strong [ref=e238]: may
                  - text: be targeted using
                  - code [ref=e239]: "@"
                  - text: .
                - listitem [ref=e240]:
                  - text: If the
                  - code [ref=e241]: DOWNSTREAM_REPO
                  - text: publishes an image to ECR (Docker Registry) you
                  - strong [ref=e242]: MUST
                  - text: adjust its image tagging strategy to ensure deployments continue successfully. Using the
                  - code [ref=e243]: "${DRONE_BUILD_NUMBER}"
                  - text: will deploy latest changes built by the trigger. When a
                  - code [ref=e244]: DOWNSTREAM_REPO
                  - text: is triggered, the git-sha remains the same.
              - paragraph [ref=e245]:
                - text: In the
                - code [ref=e246]: .drone.yml
                - text: of the downstream repo add the
                - strong [ref=e247]:
                  - code [ref=e248]: "${DRONE_BUILD_NUMBER}"
                - text: under
                - code [ref=e249]: "tags:"
                - text: in the publish step, and
                - code [ref=e250]: "values:"
                - text: "in the deploy step. e.g:"
              - generic [ref=e252]:
                - code [ref=e254]:
                  - generic [ref=e255]: "steps:"
                  - generic [ref=e256]: "- name: publish"
                  - generic [ref=e257]: "image: plugins/kaniko-ecr"
                  - generic [ref=e258]: "settings:"
                  - generic [ref=e259]: ...
                  - generic [ref=e260]: "tags:"
                  - generic [ref=e261]: "- git-${DRONE_COMMIT_SHA:0:7}-${DRONE_BUILD_NUMBER}"
                  - generic [ref=e262]: "- latest"
                  - generic [ref=e263]: ...
                  - generic [ref=e264]: "- name: deploy"
                  - generic [ref=e265]: "image: public.ecr.aws/kanopy/drone-helm:v3"
                  - generic [ref=e266]: "settings:"
                  - generic [ref=e267]: ...
                  - generic [ref=e268]: "values: image.tag=git-${DRONE_COMMIT_SHA:0:7}-${DRONE_BUILD_NUMBER},image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/devops/${DRONE_REPO_NAME},ingress.enabled=false"
                  - generic [ref=e269]: ...
                - generic [ref=e270]:
                  - button "Toggle word wrap" [ref=e271] [cursor=pointer]:
                    - img [ref=e272]
                  - button "Copy code to clipboard" [ref=e274] [cursor=pointer]:
                    - generic [ref=e275]:
                      - img [ref=e276]
                      - img [ref=e278]
              - list [ref=e280]:
                - listitem [ref=e281]: Triggered builds are asynchronous. The initiator of the trigger does not wait or register status of any downstream build.
                - listitem [ref=e282]:
                  - text: If you release to production using tagged git releases (recommended) your process to deploy to production does not change. However, be sure to target downstream builds to
                  - code [ref=e283]: develop
                  - text: or
                  - code [ref=e284]: staging
                  - text: branches.
              - heading "ParallelizationDirect link to Parallelization" [level=2] [ref=e285]:
                - text: Parallelization
                - link "Direct link to Parallelization" [ref=e286] [cursor=pointer]:
                  - /url: "#parallelization"
                  - text: "#"
              - paragraph [ref=e287]:
                - text: Drone supports parallel execution of steps and pipelines. This allows for both faster and complex build pipelines. Refer to
                - link "Drone's Parallelism" [ref=e288] [cursor=pointer]:
                  - /url: https://docs.drone.io/pipeline/kubernetes/syntax/parallelism/
                - text: for full documentation.
              - list [ref=e289]:
                - listitem [ref=e290]:
                  - text: Parallel steps execute in different containers in the
                  - strong [ref=e291]: same
                  - text: pod.
                - listitem [ref=e292]:
                  - text: Parallel pipelines execute in
                  - strong [ref=e293]: different
                  - text: pods.
              - paragraph [ref=e294]: This is an important distinction that can have direct impact on the available resources on a machine.
              - heading "Increasing Compute ResourcesDirect link to Increasing Compute Resources" [level=2] [ref=e295]:
                - text: Increasing Compute Resources
                - link "Direct link to Increasing Compute Resources" [ref=e296] [cursor=pointer]:
                  - /url: "#increasing-compute-resources"
                  - text: "#"
              - paragraph [ref=e297]: If you know your build or new E2E test requires dedicated CPU and memory to function, be sure to request it.
              - paragraph [ref=e298]: Since Drone v1, you can define resource requests at the pipeline level and resource limits at the step level. Internally Kubernetes runner will split the values, so that every container gets approximately the same amount of resources.
              - generic [ref=e300]:
                - code [ref=e302]:
                  - generic [ref=e303]: "kind: pipeline"
                  - generic [ref=e304]: "type: kubernetes"
                  - generic [ref=e305]: "resources:"
                  - generic [ref=e306]: "requests:"
                  - generic [ref=e307]: "cpu: 2000"
                  - generic [ref=e308]: "memory: 2000MiB"
                  - generic [ref=e309]: "steps:"
                  - generic [ref=e310]: "- name: backend"
                  - generic [ref=e311]: "image: golang"
                  - generic [ref=e312]: "resources:"
                  - generic [ref=e313]: "limits:"
                  - generic [ref=e314]: "cpu: 500"
                  - generic [ref=e315]: "memory: 500MiB"
                  - generic [ref=e316]: "commands:"
                  - generic [ref=e317]: "- go build"
                  - generic [ref=e318]: "- go test"
                  - generic [ref=e319]: "- go run main.go -http=:3000"
                - button "Copy code to clipboard" [ref=e321] [cursor=pointer]:
                  - generic [ref=e322]:
                    - img [ref=e323]
                    - img [ref=e325]
              - paragraph [ref=e327]:
                - text: If migrating a pipeline from an old version where resource requests and limits were specified by step, please look at the
                - link "drone resources migration advisory" [ref=e328] [cursor=pointer]:
                  - /url: /docs/advisories/2021-12-01_drone_resources_migration/
              - paragraph [ref=e329]:
                - text: "Note: If even more resources are required Drone supports"
                - link "Tolerations" [ref=e330] [cursor=pointer]:
                  - /url: https://docs.drone.io/pipeline/kubernetes/syntax/tolerations/
                - text: and
                - link "Node Selectors" [ref=e331] [cursor=pointer]:
                  - /url: https://docs.drone.io/pipeline/kubernetes/syntax/nodes/
                - text: . A build can then be scheduled on our
                - link "Batch" [ref=e332] [cursor=pointer]:
                  - /url: /docs/data-analytics/batch/
                - text: instance groups.
              - heading "MonoreposDirect link to Monorepos" [level=2] [ref=e333]:
                - text: Monorepos
                - link "Direct link to Monorepos" [ref=e334] [cursor=pointer]:
                  - /url: "#monorepos"
                  - text: "#"
              - heading "Paths ChangedDirect link to Paths Changed" [level=3] [ref=e335]:
                - text: Paths Changed
                - link "Direct link to Paths Changed" [ref=e336] [cursor=pointer]:
                  - /url: "#paths-changed"
                  - text: "#"
              - paragraph [ref=e337]:
                - text: You can use the
                - code [ref=e338]: paths
                - text: conditional to specify files to
                - code [ref=e339]: include
                - text: ", and optionally"
                - code [ref=e340]: exclude
                - text: ", to trigger pipelines and build steps. If the"
                - code [ref=e341]: paths
                - text: conditional evaluates to false for a change in GitHub, then that pipeline or step will not be present in the resulting build.
              - paragraph [ref=e342]:
                - text: Please note that there are some
                - link "known issues" [ref=e343] [cursor=pointer]:
                  - /url: https://github.com/meltwater/drone-convert-pathschanged#known-issues
                - text: with this approach.
              - list [ref=e344]:
                - listitem [ref=e345]:
                  - text: Empty commits (
                  - code [ref=e346]: git commit --allow-empty
                  - text: ) return that no files have changed, which effectively ignores all
                  - code [ref=e347]: paths
                  - text: conditionals and can result in unexpected behavior.
                - listitem [ref=e348]:
                  - text: The ordering of fields when using YAML anchors matters which can lead to build errors. See
                  - link "this workaround" [ref=e349] [cursor=pointer]:
                    - /url: https://github.com/meltwater/drone-convert-pathschanged#yaml-anchors
                  - text: for how to avoid this.
                - listitem [ref=e350]:
                  - text: The pathschanged plugin may strip away surrounding quotes
                  - code [ref=e351]: "\"...\""
                  - text: ", which may result in invalid YAML when the string ends with"
                  - code [ref=e352]: ":${DRONE_VARIABLE}"
                  - text: . See
                  - link "this" [ref=e353] [cursor=pointer]:
                    - /url: "#paths-changed---known-issues"
                  - text: for detailed explanation and workaround.
