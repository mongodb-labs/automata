              - heading "Starlark ScriptingDirect link to Starlark Scripting" [level=2] [ref=e539]:
                - text: Starlark Scripting
                - link "Direct link to Starlark Scripting" [ref=e540] [cursor=pointer]:
                  - /url: "#starlark-scripting"
                  - text: "#"
              - paragraph [ref=e541]: The Starlark configuration language can be used as an alternative to YAML-based pipelines for projects with complex configurations that benefit from using a scripting language.
              - list [ref=e542]:
                - listitem [ref=e543]:
                  - text: See the
                  - link "Drone Starlark Docs" [ref=e544] [cursor=pointer]:
                    - /url: https://docs.drone.io/pipeline/scripting/starlark/
                  - text: for information on setting up starlark scripting for your project.
                - listitem [ref=e545]:
                  - text: Starlark-based pipelines start with a
                  - code [ref=e546]: def main(ctx)
                  - text: function that receives a
                  - code [ref=e547]: ctx
                  - text: argument. The contents of the build context is currently undocumented, but you can refer to the source code for
                  - link "Drone Starlark Args" [ref=e548] [cursor=pointer]:
                    - /url: https://github.com/harness/drone/blob/v2.12.1/plugin/converter/starlark/args.go
                  - text: to get a sense of the values available to use for controlling the logic of starlark pipelines.
                - listitem [ref=e549]:
                  - text: See the
                  - link "Starlark Language Spec" [ref=e550] [cursor=pointer]:
                    - /url: https://github.com/google/starlark-go/blob/master/doc/spec.md
                  - text: for more information about the Python-like syntax of Starlark.
