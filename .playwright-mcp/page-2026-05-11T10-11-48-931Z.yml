              - paragraph [ref=e589]: "Linting validates the provided custom values.yaml in two ways, helm recommended style and against a json schema defined inside the chart, so it will help with catching misconfigurations. Lint runs as part of the install/upgrade step, failing the process if there are any issues found. Charts that support full values schema validations are:"
