              - paragraph [ref=e301]:
                - text: Since both repos target deployments into the same Helm release, Helm considers them the same application. As a result, a deployment of
                - code [ref=e302]: repo2
                - text: will wholesale-overwrite the cronjobs configured by a previous deployment of
                - code [ref=e303]: repo1
                - text: (even if the two repos have no cronjob names in common).
              - paragraph [ref=e304]: To resolve this, choose a unique name (per namespace) each time a Helm release is specified. The application or repository name (or an extension thereof) works well for this purpose.
