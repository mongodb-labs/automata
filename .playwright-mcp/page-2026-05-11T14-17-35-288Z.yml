              - img [ref=e187]
              - list [ref=e188]:
                - listitem [ref=e189]:
                  - text: View all completed/terminated workflows in the archive.
                  - emphasis [ref=e190]: "Note:"
                  - text: "Pod logs are not available in the archive, use Splunk instead. Splunk query:"
                  - code [ref=e191]: index=<namespace>-<env> pod="<pod-name-from-ui>"
                  - text: . You can obtain the pod name from the UI.
              - img [ref=e192]
              - heading "argo-workflow-catalog helm-chartDirect link to argo-workflow-catalog helm-chart" [level=2] [ref=e193]:
                - text: argo-workflow-catalog helm-chart
                - link "Direct link to argo-workflow-catalog helm-chart" [ref=e194] [cursor=pointer]:
                  - /url: "#argo-workflow-catalog-helm-chart"
                  - text: "#"
              - paragraph [ref=e195]:
                - text: Kanopy provides a helm-chart
                - link "argo-workflow-catalog" [ref=e196] [cursor=pointer]:
                  - /url: https://github.com/10gen/helm-charts/blob/master/charts/argo-workflow-catalog/values.yaml
                - text: to manage WorkflowTemplates and CronWorkflows. The intent is to store the WorkflowTemplate and CronWorkflow definitions within your repo, and use Drone to deploy changes via the helm-chart.
              - paragraph [ref=e197]: The helm-chart provides useful defaultMetrics, defaultAlerts, and support for running workflows with custom RBAC.
              - paragraph [ref=e198]:
                - text: See the
                - link "argo-workflow-catalog example" [ref=e199] [cursor=pointer]:
                  - /url: /docs/examples/argo-workflow-catalog/
                - text: for how to use the helm-chart. The helm-chart cannot be used to trigger individual workflows. Triggering can be done via the UI, CLI, or via argo events.
              - heading "CLIDirect link to CLI" [level=2] [ref=e200]:
                - text: CLI
                - link "Direct link to CLI" [ref=e201] [cursor=pointer]:
                  - /url: "#cli"
                  - text: "#"
              - paragraph [ref=e202]: There is an argo CLI for submitting and managing workflows.
              - paragraph [ref=e203]: We do not recommend the argo CLI.
              - heading "Best PracticesDirect link to Best Practices" [level=2] [ref=e204]:
                - text: Best Practices
                - link "Direct link to Best Practices" [ref=e205] [cursor=pointer]:
                  - /url: "#best-practices"
                  - text: "#"
              - heading "Workflow and Pod garbage collectionDirect link to Workflow and Pod garbage collection" [level=3] [ref=e206]:
                - text: Workflow and Pod garbage collection
                - link "Direct link to Workflow and Pod garbage collection" [ref=e207] [cursor=pointer]:
                  - /url: "#workflow-and-pod-garbage-collection"
                  - text: "#"
              - paragraph [ref=e208]: "Workflows and the pods they launch stick around unless deleted or garbage collected. Here are the default settings applied for all workflows unless overridden:"
              - list [ref=e209]:
                - listitem [ref=e210]: Pods are deleted when the Workflow is deleted
                - listitem [ref=e211]: Workflows are deleted after 1 day
              - paragraph [ref=e212]:
                - text: You can override these defaults. See
                - link "PodGC" [ref=e213] [cursor=pointer]:
                  - /url: https://github.com/argoproj/argo-workflows/blob/master/examples/pod-gc-strategy.yaml
                - text: and
                - link "Workflow GC" [ref=e214] [cursor=pointer]:
                  - /url: https://github.com/argoproj/argo-workflows/blob/master/examples/gc-ttl.yaml
                - text: examples.
              - paragraph [ref=e215]: To maintain cluster health, please choose sensible, timely garbage collection strategies.
              - paragraph [ref=e216]:
                - emphasis [ref=e217]: Note
                - text: ": retention of completed and terminated Pods cannot be guaranteed, because of kubernetes node scaling. Completed Pods may disappear outside of your garbage collection settings. Success and failure of the workflow will always be committed to the archive and logs are available via splunk. Splunk query:"
                - code [ref=e218]: index=<namespace>-<env> pod="<pod-name-from-ui>"
                - text: .
              - heading "ParallelismDirect link to Parallelism" [level=3] [ref=e219]:
                - text: Parallelism
                - link "Direct link to Parallelism" [ref=e220] [cursor=pointer]:
                  - /url: "#parallelism"
                  - text: "#"
              - paragraph [ref=e221]: "There are two aspects to parallelism:"
              - list [ref=e222]:
                - listitem [ref=e223]:
                  - text: Number of
                  - emphasis [ref=e224]: workflows
                  - text: run simultaneously. Kanopy has put a global cluster limit in place. Cannot be overridden by user. Please reach out if your workflow is stuck pending.
                - listitem [ref=e225]:
                  - text: Number of
                  - emphasis [ref=e226]: steps
                  - text: a workflow can execute in parallel. By default set to 5, can be overridden per workflow.
              - paragraph [ref=e227]:
                - text: See
                - link "this example" [ref=e228] [cursor=pointer]:
                  - /url: https://github.com/argoproj/argo-workflows/blob/master/examples/parallelism-limit.yaml
                - text: to set step parallelism. Kanopy does not currently enforce an upper bound for this, but we ask you make a concious decision as this is the number of pods that can be launched simultaneously from a workflow. If abused, it will affect cluster health.
              - heading "MetricsDirect link to Metrics" [level=3] [ref=e229]:
                - text: Metrics
                - link "Direct link to Metrics" [ref=e230] [cursor=pointer]:
                  - /url: "#metrics"
                  - text: "#"
              - paragraph [ref=e231]: "The following Prometheus metrics are enabled for all workflows managed by the argo-workflow-catalog helm-chart:"
              - list [ref=e232]:
                - listitem [ref=e233]:
                  - code [ref=e234]: "argo_workflows_{namespace}_runs_total"
                  - text: Total run count of a workflow.
                - listitem [ref=e235]:
                  - code [ref=e236]: "argo_workflows_{namespace}_status"
                  - text: Status of the workflow (Succeeded, Failed).
                - listitem [ref=e237]:
                  - code [ref=e238]: "argo_workflows_{namespace}_duration"
                  - text: Histogram of the execution duration of the workflow.
              - paragraph [ref=e239]: "The following labels will be set:"
              - list [ref=e240]:
                - listitem [ref=e241]:
                  - code [ref=e242]: name
                  - text: CronWorkflow or WorkflowTemplate name
                - listitem [ref=e243]:
                  - code [ref=e244]: release
                  - text: helm-chart release name
              - paragraph [ref=e245]:
                - text: To add your own metrics, please see this
                - link "argo doc" [ref=e246] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-workflows/metrics/#defining-metrics
                - text: .
              - heading "Passing data between StepsDirect link to Passing data between Steps" [level=3] [ref=e247]:
                - text: Passing data between Steps
                - link "Direct link to Passing data between Steps" [ref=e248] [cursor=pointer]:
                  - /url: "#passing-data-between-steps"
                  - text: "#"
              - paragraph [ref=e249]:
                - text: To pass output text
                - strong [ref=e250]: smaller than 256 kB
                - text: between steps, use
                - link "Output Parameters" [ref=e251] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-workflows/walk-through/output-parameters/
                - text: .
              - paragraph [ref=e252]:
                - text: To pass
                - strong [ref=e253]: larger
                - text: data between steps, use
                - link "Volumes" [ref=e254] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-workflows/walk-through/volumes/
                - text: . This creates a PVC lasting the lifecycle of the Workflow which can be used by multiple steps.
                - code [ref=e255]: ReadWriteOnce
                - text: accessMode is fine for steps that do not run in parallel. If you need to mount a PVC to steps running in parallel, then you will need
                - code [ref=e256]: ReadWriteMany
                - text: . See
                - link "this" [ref=e257] [cursor=pointer]:
                  - /url: https://kanopy.corp.mongodb.com/docs/production/storage/#rwxrox-volumes
                - text: for how to request access.
              - paragraph [ref=e258]:
                - text: Alternatively to Volumes, you can use
                - link "Artifacts" [ref=e259] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-workflows/walk-through/artifacts/
                - text: ", which requires you to configure an external S3 artifact repository. Kanopy does not provide an artifact repository by default. See the"
                - link "S3 Artifact Storage guide" [ref=e260] [cursor=pointer]:
                  - /url: /docs/beta/argo_workflows/s3-artifacts/
                - text: for how to bring your own S3 bucket.
              - heading "Known LimitationsDirect link to Known Limitations" [level=2] [ref=e261]:
                - text: Known Limitations
                - link "Direct link to Known Limitations" [ref=e262] [cursor=pointer]:
                  - /url: "#known-limitations"
                  - text: "#"
