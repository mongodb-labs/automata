                - text: FAQ
                - link "Direct link to FAQ" [ref=e267] [cursor=pointer]:
                  - /url: "#faq"
                  - text: "#"
              - heading "Why am I getting a permissions error when launching a workflow?Direct link to Why am I getting a permissions error when launching a workflow?" [level=3] [ref=e268]:
                - text: Why am I getting a permissions error when launching a workflow?
                - link "Direct link to Why am I getting a permissions error when launching a workflow?" [ref=e269] [cursor=pointer]:
                  - /url: "#why-am-i-getting-a-permissions-error-when-launching-a-workflow"
                  - text: "#"
              - paragraph [ref=e270]:
                - text: "If you see the following error:"
                - code [ref=e271]: User "system:serviceaccount:..." cannot patch resource "pods"
                - text: ":"
              - list [ref=e272]:
                - listitem [ref=e273]:
                  - text: If you are using the
                  - link "argo-workflow-catalog" [ref=e274] [cursor=pointer]:
                    - /url: https://github.com/10gen/helm-charts/blob/master/charts/argo-workflow-catalog/
                  - text: ", you need to upgrade the chart to at least"
                  - strong [ref=e275]: v0.3.2
                  - text: . Populate the
                  - code [ref=e276]: serviceAccounts
                  - text: list and specify in the workflowSpec with
                  - code [ref=e277]: "serviceAccountName: <>"
                  - text: . These ServiceAccounts will automatically get the necessary executor RoleBinding.
                - listitem [ref=e278]:
                  - text: If you are not using the chart, you need to add the following
                  - code [ref=e279]: Role
                  - text: "&"
                  - code [ref=e280]: RoleBinding
                  - text: "to your namespace:"
              - generic [ref=e282]:
