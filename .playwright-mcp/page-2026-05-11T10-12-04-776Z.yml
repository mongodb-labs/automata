            - generic [ref=e147]:
              - heading "Helm" [level=1] [ref=e149]
              - paragraph [ref=e150]:
                - text: If you are looking for installation instructions jump to
                - link "Installation" [ref=e151] [cursor=pointer]:
                  - /url: "#installation"
                - text: .
              - paragraph [ref=e152]:
                - text: For instructions to configure and use the
                - strong [ref=e153]: LEGACY
                - text: helm v2 version, jump to
                - link "helm v2 instructions" [ref=e154] [cursor=pointer]:
                  - /url: /docs/configuration/legacy_helm_v2/
                - text: .
              - paragraph [ref=e155]: "Kubernetes applications require multiple objects to be created in order to operate. For instance, a web application might be composed of the following k8s resources:"
              - list [ref=e156]:
                - listitem [ref=e157]: Deployment
                - listitem [ref=e158]: Configmap
                - listitem [ref=e159]: Secret
                - listitem [ref=e160]: Service
                - listitem [ref=e161]: Ingress
              - paragraph [ref=e162]:
                - text: Creating each resource individually is cumbersome, therefore Kanopy uses
                - link "Helm" [ref=e163] [cursor=pointer]:
                  - /url: https://helm.sh/
                - text: to package and deploy Kubernetes applications.
              - paragraph [ref=e164]:
                - text: Helm uses a packaging format called
                - link "Charts" [ref=e165] [cursor=pointer]:
                  - /url: https://helm.sh/docs/topics/charts/
                - text: to abstract the complexity of an application by templating Kubernetes object definitions, allowing the user to pass a much simpler values file with environment-specific configuration. A chart is a collection of files that describes a set of related Kubernetes resources. A single chart could be used to deployed a small web application, or something more complex, like a full stack of microservices.
              - paragraph [ref=e166]: Kanopy provides charts for the most common use cases across MongoDB.
              - heading "web-app ChartDirect link to web-app-chart" [level=2] [ref=e167]:
                - link "web-app Chart" [ref=e168] [cursor=pointer]:
                  - /url: /docs/examples/web-app/
                - link "Direct link to web-app-chart" [ref=e169] [cursor=pointer]:
                  - /url: "#web-app-chart"
                  - text: "#"
              - paragraph [ref=e170]:
                - code [ref=e171]: web-app
                - text: is a bit of a misnomer, since most
                - link "Twelve-factor" [ref=e172] [cursor=pointer]:
                  - /url: https://12factor.net/
                - text: "applications can be deployed with it. This chart is being used in Kanopy for many services, such as:"
              - list [ref=e173]:
                - listitem [ref=e174]: Web applications
                - listitem [ref=e175]: Services exposing a REST or gRPC APIs
                - listitem [ref=e176]: Slack and Github bots
                - listitem [ref=e177]: etc.
              - heading "cronjobs ChartDirect link to cronjobs-chart" [level=2] [ref=e178]:
                - link "cronjobs Chart" [ref=e179] [cursor=pointer]:
                  - /url: /docs/examples/cronjobs/
                - link "Direct link to cronjobs-chart" [ref=e180] [cursor=pointer]:
                  - /url: "#cronjobs-chart"
                  - text: "#"
              - paragraph [ref=e181]:
                - text: The
                - code [ref=e182]: cronjobs
                - text: "chart configures Kubernetes Cronjobs, which is used across the company to configure run to completion jobs. These are some examples of Kanopy jobs that run on a schedule:"
              - list [ref=e183]:
                - listitem [ref=e184]: Pulling data from an external service's API to update a MongoDB database
                - listitem [ref=e185]: Training machine learning models
                - listitem [ref=e186]: Performing maintenance on Jira projects
                - listitem [ref=e187]: Syncing data between dependent services
                - listitem [ref=e188]: Creating and e-mailing analysis reports
                - listitem [ref=e189]: and many others
