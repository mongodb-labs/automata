                  - /url: "#through-drone"
                  - text: "#"
              - paragraph [ref=e201]: Kanopy provides a Drone plugin in the form of a Docker image that contains the Helm executable. In order for applications to use the Kanopy helm charts they simply need to add a Drone pipeline step that uses this image.
              - paragraph [ref=e202]:
