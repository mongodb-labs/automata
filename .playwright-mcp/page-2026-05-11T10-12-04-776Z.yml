                  - text: "#"
              - paragraph [ref=e206]: "Helm as a command-line tool can be used for a variety of operations:"
              - list [ref=e207]:
                - listitem [ref=e208]: Viewing the history of deployments for a release
                - listitem [ref=e209]: Rolling back a deployment to a previous version
                - listitem [ref=e210]: Manually installing a release to a namespace (not recommended other than for testing - Drone should be used in most cases)
              - paragraph [ref=e211]: To use the mongodb provided helm charts, add repo (recommended)
