              - heading "ConfigurationDirect link to Configuration" [level=2] [ref=e184]:
                - text: Configuration
                - link "Direct link to Configuration" [ref=e185] [cursor=pointer]:
                  - /url: "#configuration"
                  - text: "#"
              - paragraph [ref=e186]: "EventSource resources using well known webhook sources have to meet certain requirements:"
              - list [ref=e187]:
                - listitem [ref=e188]:
                  - text: They MUST include the annotation
                  - code [ref=e189]: v1alpha1.argoslower.kanopy-platform/known-source
                  - text: with the appropriate well known source name as the value.
                - listitem [ref=e190]: Webhook type EventSources MUST include an AuthSecret
                - listitem [ref=e191]: Github type EventSources MUST include a WebhookSecret
                - listitem [ref=e192]: AuthSecrets and WebhookSecrets MUST be at least 12 characters
              - heading "ExampleDirect link to Example" [level=2] [ref=e193]:
                - text: Example
                - link "Direct link to Example" [ref=e194] [cursor=pointer]:
                  - /url: "#example"
                  - text: "#"
              - paragraph [ref=e195]:
                - text: The following EventSource creates a webhook available to the offices, vpns, and Cloudflare WARP. After creation, the webhook would be exposed on the
                - code [ref=e196]: https://webhooks.example.com/example/example-officeips/example
                - text: .
              - paragraph [ref=e197]:
                - text: The EventSource depends on an argo EventBus named
                - code [ref=e198]: example-bus
                - text: and a Secret named
                - code [ref=e199]: argoevents-example
                - text: in the
                - code [ref=e200]: example
                - text: namespace.
              - generic [ref=e202]:
                - code [ref=e204]:
                  - generic [ref=e205]: "apiVersion: argoproj.io/v1alpha1"
                  - generic [ref=e206]: "kind: EventSource"
                  - generic [ref=e207]: "metadata:"
                  - generic [ref=e208]: "name: example-officeips"
                  - generic [ref=e209]: "namespace: example"
                  - generic [ref=e210]: "annotations:"
                  - generic [ref=e211]: "v1alpha1.argoslower.kanopy-platform/known-source: \"officeips\""
                  - generic [ref=e212]: "spec:"
                  - generic [ref=e213]: "eventBusName: example-bus"
                  - generic [ref=e214]: "service:"
                  - generic [ref=e215]: "ports:"
                  - generic [ref=e216]: "- port: 80"
                  - generic [ref=e217]: "targetPort: 8080"
                  - generic [ref=e218]: "webhook:"
                  - generic [ref=e219]: "example:"
                  - generic [ref=e220]: "endpoint: /example"
                  - generic [ref=e221]: "method: POST"
                  - generic [ref=e222]: "port: \"8080\""
                  - generic [ref=e223]: "authSecret:"
                  - generic [ref=e224]: "name: argoevents-example"
                  - generic [ref=e225]: "key: token"
                - button "Copy code to clipboard" [ref=e227] [cursor=pointer]:
                  - generic [ref=e228]:
                    - img [ref=e229]
                    - img [ref=e231]
              - paragraph [ref=e233]:
                - text: After creation the webhook can be accessed via a POST request with an application/json encoded request body of the format
                - code [ref=e234]: "'{\"msg\": \"Hello World!\"}'"
                - text: and the value of the secret
                - code [ref=e235]: argoevents-example
                - text: token key as the Authorization bearer header.
              - generic [ref=e237]:
                - code [ref=e239]:
                  - generic [ref=e240]: "curl --header \"Content-Type: application/json\" --header \"Authorization: Bearer longcomplextokenvalue\" https://webhooks.example.com/example/example-officeips/example"
