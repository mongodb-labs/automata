              - heading "External Webhooks" [level=1] [ref=e162]
              - paragraph [ref=e163]: "Kanopy supports self-service vanity hostname creation for argo-events Webhook EventSources from several well known sources. If your webhook source doesn't appear in the well known sources list, a vanity hostname request and ENTSEC approval is required for routing requests to your EventSource. Upon successful creation services will be available on the following URLs:"
              - paragraph [ref=e164]:
                - text: "Prod:"
                - code [ref=e165]: https://webhooks.prod.corp.mongodb.com/<namespace>/<eventsourceresourcename>/<eventsource.spec.endpoint>
                - text: "Staging:"
                - code [ref=e166]: https://webhooks.staging.corp.mongodb.com/<namespace>/<eventsourceresourcename>/<eventsource.spec.endpoint>
              - heading "Well Known SourcesDirect link to Well Known Sources" [level=2] [ref=e167]:
                - text: Well Known Sources
