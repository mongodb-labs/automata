            - generic [ref=e158]:
              - heading "Argo Events" [level=1] [ref=e160]
              - paragraph [ref=e161]:
                - link "Argo Events" [ref=e162] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-events/
                - text: is an event driven automation framework that allows you to detect events from a variety of sources (webhooks, S3, SNS, SQS, etc) and trigger kubernetes objects, argo workflows, or other workloads.
              - heading "Getting startedDirect link to Getting started" [level=2] [ref=e163]:
                - text: Getting started
                - link "Direct link to Getting started" [ref=e164] [cursor=pointer]:
                  - /url: "#getting-started"
                  - text: "#"
              - paragraph [ref=e165]:
                - text: 3 minute introduction
                - link "video" [ref=e166] [cursor=pointer]:
                  - /url: https://www.youtube.com/watch?v=Aqi1zyTpM44
              - paragraph [ref=e167]:
                - text: "Documentation:"
                - link "https://argoproj.github.io/argo-events/concepts/architecture/" [ref=e168] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-events/concepts/architecture/
              - paragraph [ref=e169]: The argo events controller has been installed in all Kanopy environments. To create an event handler, you need to create the EventBus, EventSource and Sensor objects.
              - heading "EventBusDirect link to EventBus" [level=3] [ref=e170]:
                - text: EventBus
                - link "Direct link to EventBus" [ref=e171] [cursor=pointer]:
                  - /url: "#eventbus"
                  - text: "#"
              - paragraph [ref=e172]:
                - text: Kanopy provides a helm-chart
                - link "argo-eventbus" [ref=e173] [cursor=pointer]:
                  - /url: https://github.com/10gen/helm-charts/tree/master/charts/argo-eventbus
                - text: to manage EventBus objects for a given namespace. The intent is to store the EventBus configurations within your repo, and use Drone to deploy changes via the helm-chart. The helm-chart provides some useful metrics scraping, and defaultAlerts for the EventBus objects. See the helm-chart
                - link "readme" [ref=e174] [cursor=pointer]:
                  - /url: https://github.com/10gen/helm-charts/blob/master/charts/argo-eventbus/README.md
                - text: for configuration instructions.
              - paragraph [ref=e175]: Once deployed, argo-events controllers will create the underlying NATS Jetstream messaging bus pods.
              - heading "EventSourceDirect link to EventSource" [level=3] [ref=e176]:
                - text: EventSource
                - link "Direct link to EventSource" [ref=e177] [cursor=pointer]:
                  - /url: "#eventsource"
                  - text: "#"
              - paragraph [ref=e178]:
                - text: Kanopy does not currently provide a helm-chart for managing EventSource objects, but it is on the
                - link "roadmap" [ref=e179] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/browse/INFRA-3453
                - text: .
              - paragraph [ref=e180]:
                - text: For now, please create the
                - link "EventSource" [ref=e181] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-events/concepts/event_source/
                - text: kubernetes object manually.
              - heading "SensorDirect link to Sensor" [level=3] [ref=e182]:
                - text: Sensor
                - link "Direct link to Sensor" [ref=e183] [cursor=pointer]:
                  - /url: "#sensor"
                  - text: "#"
              - paragraph [ref=e184]:
                - text: Kanopy does not currently provide a helm-chart for managing Sensor objects, but it is on the
                - link "roadmap" [ref=e185] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/browse/INFRA-3454
                - text: .
              - paragraph [ref=e186]:
                - text: For now, please create the
                - link "Sensor" [ref=e187] [cursor=pointer]:
                  - /url: https://argoproj.github.io/argo-events/concepts/sensor/
                - text: kubernetes object manually.
              - heading "Create an Example Event FlowDirect link to Create an Example Event Flow" [level=2] [ref=e188]:
                - text: Create an Example Event Flow
                - link "Direct link to Create an Example Event Flow" [ref=e189] [cursor=pointer]:
                  - /url: "#create-an-example-event-flow"
                  - text: "#"
              - paragraph [ref=e190]: "Connect to VPN, then visit:"
              - list [ref=e191]:
                - listitem [ref=e192]:
                  - link "Workflows Staging" [ref=e193] [cursor=pointer]:
                    - /url: https://workflows.staging.corp.mongodb.com
                - listitem [ref=e194]:
                  - link "Workflows Production" [ref=e195] [cursor=pointer]:
                    - /url: https://workflows.prod.corp.mongodb.com
              - list [ref=e196]:
                - listitem [ref=e197]:
                  - text: Log in, go to
                  - code [ref=e198]: Event Flow
                  - text: and access your namespace. Your page may be empty.
              - img [ref=e199]
              - list [ref=e200]:
                - listitem [ref=e201]:
                  - text: Follow the
                  - link "argo-events example" [ref=e202] [cursor=pointer]:
                    - /url: /docs/examples/argo-events/
                  - text: to set up the Event Flow.
              - paragraph [ref=e203]:
                - text: The
                - code [ref=e204]: Event Sources
                - text: and
                - code [ref=e205]: Sensors
                - text: navigation links on the left side of the UI lists instances of the two object types in your namespace. The
                - code [ref=e206]: Workflow Event Binding
                - text: link is a separate feature that is unrelated and can be ignored.
              - heading "NotesDirect link to Notes" [level=2] [ref=e207]:
                - text: Notes
                - link "Direct link to Notes" [ref=e208] [cursor=pointer]:
                  - /url: "#notes"
                  - text: "#"
              - heading "External EventSource WebhooksDirect link to External EventSource Webhooks" [level=3] [ref=e209]:
                - text: External EventSource Webhooks
                - link "Direct link to External EventSource Webhooks" [ref=e210] [cursor=pointer]:
                  - /url: "#external-eventsource-webhooks"
                  - text: "#"
              - paragraph [ref=e211]:
                - text: Kanopy supports a limited number of self-service webhooks for well known external sources. See the
                - link "well known sources documentation" [ref=e212] [cursor=pointer]:
                  - /url: /docs/beta/events/webhooks/
                - text: for more details.
              - paragraph [ref=e213]:
                - text: For all other EventSource webhooks that need to be triggered from an external system require approval from ENTSEC. Once approved, raise a
                - link "KANOPY" [ref=e214] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/plugins/servlet/desk/portal/48
                - text: ticket for
                - code [ref=e215]: Vanity Hostname Request
                - text: "including the following details:"
              - list [ref=e216]:
                - listitem [ref=e217]: ENTSEC ticket
                - listitem [ref=e218]: External system and the source IPs that will trigger the webhooks
              - paragraph [ref=e219]:
                - text: If you have a commonly used webhook source supported by argo-events and would like to add the event source to the list of well known external sources, please create a (KANOPY Suggestion)[
                - link "https://jira.mongodb.org/plugins/servlet/desk/portal/48/create/768" [ref=e220] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/plugins/servlet/desk/portal/48/create/768
                - text: "] documenting the event source type and the well established IP or identity best practices provided by the event source."
              - heading "Rate LimitDirect link to Rate Limit" [level=3] [ref=e221]:
                - text: Rate Limit
                - link "Direct link to Rate Limit" [ref=e222] [cursor=pointer]:
                  - /url: "#rate-limit"
                  - text: "#"
              - paragraph [ref=e223]:
                - text: Sensor spec can specify a
                - link "Trigger RateLimit" [ref=e224] [cursor=pointer]:
                  - /url: https://github.com/argoproj/argo-events/blob/master/api/sensor.md#trigger
                - text: on how frequently the downstream operation can be triggered, for example once per minute.
              - paragraph [ref=e225]:
                - text: Kanopy enforces a maximum RateLimit of
                - code [ref=e226]: 1 per Second
                - text: for k8s triggers to prevent abuse. Sensors that do not have a RateLimit for k8s triggers or specify a higher RateLimit (e.g.
                - code [ref=e227]: 50 per Second
                - text: ) will have the default
                - code [ref=e228]: 1 per Second
                - text: set. If you require a higher rate please raise a
                - link "KANOPY" [ref=e229] [cursor=pointer]:
                  - /url: https://jira.mongodb.org/plugins/servlet/desk/portal/48
                - text: "ticket with the following details and an exception can be made for your namespace:"
              - list [ref=e230]:
                - listitem [ref=e231]: Namespace
                - listitem [ref=e232]: EventSource and Sensor name(s)
                - listitem [ref=e233]: Use case and requested RateLimit
