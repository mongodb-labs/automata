---
kind: pipeline
type: kubernetes
name: default
trigger:
  event:
    - push
    - pull_request
  branch:
    - main

steps:
  - name: lint
    image: rust:1.94-slim
    commands:
      - rustup component add clippy rustfmt
      - cargo fmt --check
      - cargo clippy -- -D warnings
    when:
      event: [push, pull_request]

  - name: test
    image: rust:1.94-slim
    environment:
      COVERALLS_REPO_TOKEN:
        from_secret: coveralls_repo_token
    commands:
      - apt-get update -qq && apt-get install -y curl ca-certificates
      - rustup component add llvm-tools-preview
      - curl -LsSf https://github.com/taiki-e/cargo-llvm-cov/releases/latest/download/cargo-llvm-cov-x86_64-unknown-linux-musl.tar.gz | tar xzf - -C ~/.cargo/bin
      - curl -sL https://coveralls.io/coveralls-linux.tar.gz | tar xz -C /usr/local/bin
      - cargo llvm-cov --lcov --output-path lcov.info
      - coveralls report --repo-token "$COVERALLS_REPO_TOKEN" --service-name drone --service-job-id "$DRONE_BUILD_NUMBER" lcov.info
    when:
      event: [push, pull_request]

  - name: build-and-push
    image: plugins/kaniko-ecr
    settings:
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: skunkworks/automata
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      create_repository: true
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event: [push]

  - name: deploy-service
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.25.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: skunkworks
      release: automata
      values_files: ["environments/staging.yaml"]
      values: image.tag=git-${DRONE_COMMIT_SHA:0:7}
      api_server: https://api.staging.corp.mongodb.com
      kubernetes_token:
        from_secret: staging_kubernetes_token
    when:
      event: [push]

  - name: deploy-eventbus
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/argo-eventbus
      chart_version: 0.2.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: skunkworks
      release: automata-eventbus
      values_files: ["environments/common/eventbus-values.yaml"]
      api_server: https://api.staging.corp.mongodb.com
      kubernetes_token:
        from_secret: staging_kubernetes_token
    when:
      event: [push]

  - name: apply-k8s
    image: bitnami/kubectl
    environment:
      KUBE_TOKEN:
        from_secret: staging_kubernetes_token
    commands:
      - kubectl config set-credentials cicd --token=$KUBE_TOKEN
      - kubectl config set-cluster staging --server=https://api.staging.corp.mongodb.com
      - kubectl config set-context default --cluster=staging --user=cicd --namespace=skunkworks
      - kubectl config use-context default
      - kubectl apply -f environments/common/eventsource.yaml
      - kubectl apply -f environments/common/eventsource-sce.yaml
      - kubectl apply -f environments/common/sensor.yaml
    when:
      event: [push]
