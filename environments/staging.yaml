image:
  repository: 795250896452.dkr.ecr.us-east-1.amazonaws.com/skunkworks/automata
  tag: latest

replicaCount: 1


ingress:
  enabled: true
  hosts:
    - automata.skunkworks.staging.corp.mongodb.com

mesh:
  enabled: true

env:
  RUST_LOG: info,automata::handlers=debug
  WEBHOOK_URL: https://webhooks.staging.corp.mongodb.com/skunkworks/automata-github/github
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger-operator-jaeger-collector.monitoring.svc:4317

envSecrets:
  GITHUB_APP_ID: automata-secrets
  GITHUB_APP_PRIVATE_KEY: automata-secrets
  GITHUB_WEBHOOK_SECRET: automata-secrets
  SENSOR_TOKEN: automata-secrets
  JIRA_BASE_URL: automata-secrets
  JIRA_API_TOKEN: automata-secrets

deployment:
  annotations:
    sidecar.jaegertracing.io/inject: jaeger-operator-jaeger

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
