name: jira-lifecycle-cloudp
pipeline:
  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        - mongodb/atlas-local-lib
        - mongodb/atlas-local-cli
        - mongodb-js/atlas-local-lib-js
        # - mongodb/mongodb-atlas-cli    # covered by GHA: https://github.com/mongodb/mongodb-atlas-cli/blob/930d652c327f4486f53eaa632b399ddc5ce224f7/.github/workflows/dependabot-create-jira-issue.yml
        # - mongodb/mongodb-atlas-local  # covered by GHA: https://github.com/mongodb/mongodb-atlas-local/blob/db40db9b08f266cf7ec8f110bce7d8a837d13dc5/.github/workflows/dependabot-jira.yml
        # - mongodb-labs/cobra2snooty    # covered by GHA: https://github.com/mongodb-labs/cobra2snooty/blob/bd5445cb1e72dfceeb8987e22afab30ad8561938/.github/workflows/dependabot.yml
    when:
      - event: pull_request
        action: opened
        actor: "dependabot[bot]"
    then:
      - builtin.lookup:
          id: repo_config
          input: "{payload.repository.name}"
          table:
            mongodb-atlas-cli:
              component: AtlasCLI
              fix_version_name: next-atlascli-release
            mongodb-atlas-local:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-lib:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-cli:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-lib-js:
              component: local-atlas-experience
              fix_version_name: Not Applicable
          default:
            component: AtlasCLI
            fix_version_name: Not Applicable
      - jira.create_issue:
          id: ticket
          issue_type: Story
          project: CLOUDP
          component: "{repo_config.output.component}"
          assignee: "cloud-atlascli-escalation"
          custom_fields:
            customfield_12751:
              - id: "22223"
            customfield_10257:
              value: "Not Needed"
            fixVersions:
              - name: "{repo_config.output.fix_version_name}"
          summary: "[{payload.repository.name}] {payload.pull_request.title}"
          description: "This ticket tracks the following GitHub pull request: {payload.pull_request.html_url}"
      - github.post_comment:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
          body: "The ticket [{ticket.output.key}]({ticket.output.url}) was created for internal tracking.\n\nNote: Jira ticket will be closed automatically when this PR is merged."
      - github.add_label:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
          label: auto_close_jira

  # Manual trigger for testing: add the `create_jira` label to any PR in these repos
  # to fire ticket creation. The label is removed after the ticket is posted.
  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        - mongodb/atlas-local-lib
        - mongodb/atlas-local-cli
        - mongodb-js/atlas-local-lib-js
        - mongodb/mongodb-atlas-cli
        - mongodb/mongodb-atlas-local
        - mongodb-labs/cobra2snooty
    when:
      - event: pull_request
        action: labeled
        label: create_jira
    then:
      - github.get_commit:
          id: head_commit
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          sha: "{payload.pull_request.head.sha}"
      - builtin.jq:
          id: author
          input: head_commit
          expr: '.output.commit.author.email | if . != null and test("@mongodb\\.com$") then {{name: .}} else {{name: "cloud-atlascli-escalation"}} end'
      - builtin.lookup:
          id: repo_config
          input: "{payload.repository.name}"
          table:
            mongodb-atlas-cli:
              component: AtlasCLI
              fix_version_name: next-atlascli-release
            mongodb-atlas-local:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-lib:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-cli:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            atlas-local-lib-js:
              component: local-atlas-experience
              fix_version_name: Not Applicable
            cobra2snooty:
              component: AtlasCLI
              fix_version_name: Not Applicable
          default:
            component: AtlasCLI
            fix_version_name: Not Applicable
      - jira.create_issue:
          id: ticket
          issue_type: Story
          project: CLOUDP
          component: "{repo_config.output.component}"
          assignee: "{author.output.name}"
          custom_fields:
            customfield_12751:
              - id: "22223"
            customfield_10257:
              value: "Not Needed"
            fixVersions:
              - name: "{repo_config.output.fix_version_name}"
          summary: "[{payload.repository.name}] {payload.pull_request.title}"
          description: "This ticket tracks the following GitHub pull request: {payload.pull_request.html_url}"
      - github.post_comment:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
          body: "The ticket [{ticket.output.key}]({ticket.output.url}) was created for internal tracking.\n\nNote: Jira ticket will be closed automatically when this PR is merged."
      - github.add_label:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
          label: auto_close_jira
      - github.remove_label:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
          label: create_jira

  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        - mongodb/atlas-local-lib
        - mongodb/atlas-local-cli
        - mongodb-js/atlas-local-lib-js
        # - mongodb/mongodb-atlas-cli    # covered by GHA: https://github.com/mongodb/mongodb-atlas-cli/blob/930d652c327f4486f53eaa632b399ddc5ce224f7/.github/workflows/close-jira.yml
        # - mongodb/mongodb-atlas-local  # covered by GHA: https://github.com/mongodb/mongodb-atlas-local/blob/db40db9b08f266cf7ec8f110bce7d8a837d13dc5/.github/workflows/close-jira.yml
        # - mongodb-labs/cobra2snooty    # covered by GHA: https://github.com/mongodb-labs/cobra2snooty/blob/7356179b854df9fb7cc87bb9c07699f082926633/.github/workflows/close-jira.yml
    when:
      - event: pull_request
        action: closed
        merged: true
        label: auto_close_jira
    then:
      - github.list_pr_comments:
          id: comments
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
      - builtin.jq:
          id: find
          input: comments
          expr: 'first(.output.comments[] | select(.body | test("was created for internal tracking")) | .body | scan("CLOUDP-[0-9]+")) | {{key: .}}'
      - jira.transition:
          key: "{find.output.key}"
          transition_id: "1381"
          fields:
            resolution:
              name: Fixed
            fixVersions:
              - name: "Not Applicable"

  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        - mongodb/atlas-local-lib
        - mongodb/atlas-local-cli
        - mongodb-js/atlas-local-lib-js
        # - mongodb/mongodb-atlas-cli    # covered by GHA: https://github.com/mongodb/mongodb-atlas-cli/blob/930d652c327f4486f53eaa632b399ddc5ce224f7/.github/workflows/close-jira.yml
        # - mongodb/mongodb-atlas-local  # covered by GHA: https://github.com/mongodb/mongodb-atlas-local/blob/db40db9b08f266cf7ec8f110bce7d8a837d13dc5/.github/workflows/close-jira.yml
    when:
      - event: pull_request
        action: closed
        merged: false
        label: auto_close_jira
    then:
      - github.list_pr_comments:
          id: comments
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
      - builtin.jq:
          id: find
          input: comments
          expr: 'first(.output.comments[] | select(.body | test("was created for internal tracking")) | .body | scan("CLOUDP-[0-9]+")) | {{key: .}}'
      - jira.transition:
          key: "{find.output.key}"
          transition_id: "1371"
          fields:
            fixVersions:
              - name: "Not Applicable"
