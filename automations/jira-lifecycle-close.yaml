name: jira-lifecycle-close
pipeline:
  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        # - mongodb/mongodb-atlas-cli
        # - mongodb/mongodb-atlas-local
        # - mongodb/atlas-github-action
        # - mongodb-labs/cobra2snooty
    when:
      - event: pull_request
        action: closed
        merged: true
        labels_include: [auto_close_jira]
    then:
      - github.list_pr_comments:
          id: comments
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.pull_request.number}"
      - builtin.jq:
          id: find
          input: comments
          expr: 'first(.comments[].body | scan("CLOUDP-[0-9]+"))'
      - jira.transition:
          key: "{find.result}"
          transition_id: "1381"
