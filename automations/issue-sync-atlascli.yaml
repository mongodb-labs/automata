name: issue-sync-atlascli
pipeline:
  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        # - mongodb/mongodb-atlas-cli
        # - mongodb/atlas-github-action
    when:
      - event: issues
        action: opened
    then:
      - builtin.lookup:
          id: repo_config
          input: "{payload.repository.name}"
          table:
            mongodb-atlas-local:
              component: local-atlas-experience
            atlas-local-lib:
              component: local-atlas-experience
            atlas-local-cli:
              component: local-atlas-experience
            atlas-local-lib-js:
              component: local-atlas-experience
          default:
            component: AtlasCLI
      - jira.create_issue:
          id: ticket
          issue_type: Story
          project: CLOUDP
          component: "{repo_config.output.component}"
          custom_fields:
            customfield_12751:
              - id: "22223"
            customfield_10257:
              value: "Not Needed"
            fixVersions:
              - name: "Not Applicable"
          summary: "[{payload.repository.name}] {payload.issue.title}"
          description: "This ticket tracks the following GitHub issue: {payload.issue.html_url}"
      - github.post_comment:
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.issue.number}"
          body: "Thanks for opening this issue. The ticket [{ticket.output.key}]({ticket.output.url}) was created for internal tracking."

  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        # - mongodb/mongodb-atlas-cli
        # - mongodb/atlas-github-action
    when:
      - event: issues
        action: closed
    then:
      - github.list_pr_comments:
          id: comments
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.issue.number}"
      - builtin.jq:
          id: find
          input: comments
          expr: 'first(.output.comments[] | select(.body | test("was created for internal tracking")) | .body | scan("CLOUDP-[0-9]+")) | {{key: .}}'
      - jira.transition:
          key: "{find.output.key}"
          transition_id: "1381"

  - given:
      trigger: github
      repos:
        - mongodb-labs/automata
        # - mongodb/mongodb-atlas-cli
        # - mongodb/atlas-github-action
    when:
      - event: issues
        action: reopened
    then:
      - github.list_pr_comments:
          id: comments
          owner: "{payload.repository.owner.login}"
          repo: "{payload.repository.name}"
          number: "{payload.issue.number}"
      - builtin.jq:
          id: find
          input: comments
          expr: 'first(.output.comments[] | select(.body | test("was created for internal tracking")) | .body | scan("CLOUDP-[0-9]+")) | {{key: .}}'
      - jira.transition:
          key: "{find.output.key}"
          transition_id: "1351"
